<link rel="stylesheet" href="css/service-form.css">
<form class="container-form custom-form" data-form-type="service">

    <!-- Kontaktinformationen -->
    <div class="form-section">
        <div class="section-title">
            <i class="bi bi-person-circle"></i>
            Kontaktinformationen
        </div>

        <div class="row mb-3">
            <div class="col-md-6">
                <label class="form-label">Vorname <span style="color: var(--danger);">*</span></label>
                <input type="text" name="name" class="form-control" placeholder="z.B. Max" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Nachname <span style="color: var(--danger);">*</span></label>
                <input type="text" name="lastname" class="form-control" placeholder="z.B. Müller" required>
            </div>
        </div>

        <div class="row mb-3">
            <div class="col-md-6">
                <label class="form-label">E-Mail <span style="color: var(--danger);">*</span></label>
                <input type="email" name="email" class="form-control" placeholder="max.mueller@example.com" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Telefonnummer <span style="color: var(--danger);">*</span></label>
                <input type="tel" name="phone" class="form-control" placeholder="+49 30 123456789" required>
            </div>
        </div>
    </div>

    <!-- Adressinformationen -->
    <div class="form-section">
        <div class="section-title">
            <i class="bi bi-geo-alt"></i>
            Adressinformationen
        </div>

        <div class="row mb-3">
            <div class="col-md-6">
                <label class="form-label">Straße und Hausnummer <span style="color: var(--danger);">*</span></label>
                <input type="text" name="street" class="form-control" placeholder="z.B. Hauptstraße 42" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Postleitzahl <span style="color: var(--danger);">*</span></label>
                <input type="text" name="postal_code" class="form-control" placeholder="z.B. 10115" required>
            </div>
        </div>

        <div>
            <label class="form-label">Wohnungstyp <span style="color: var(--danger);">*</span></label>
            <div class="radio-group">
                <div class="radio-item">
                    <input type="radio" name="property_type" id="apartment" value="apartment" required>
                    <label for="apartment">
                        <i class="bi bi-building"></i> Wohnung / Apartment
                    </label>
                </div>
                <div class="radio-item">
                    <input type="radio" name="property_type" id="house" value="house">
                    <label for="house">
                        <i class="bi bi-house"></i> Haus
                    </label>
                </div>
                <div class="radio-item">
                    <input type="radio" name="property_type" id="office" value="office">
                    <label for="office">
                        <i class="bi bi-building-check"></i> Büro / Gewerbefläche
                    </label>
                </div>
            </div>
        </div>
    </div>

    <!-- Reinigungsdetails -->
    <div class="form-section">
        <div class="section-title">
            <i class="bi bi-brush"></i>
            Reinigungsdetails
        </div>

        <!-- <div class="row mb-3">
            <div class="col-md-6">
                <label class="form-label">Fläche in m² <span style="color: var(--danger);">*</span></label>
                <input type="number" name="area" class="form-control" placeholder="z.B. 85" min="1" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Anzahl der Räume <span style="color: var(--danger);">*</span></label>
                <input type="number" name="rooms" class="form-control" placeholder="z.B. 3" min="1" required>
            </div>
        </div> -->

        <label class="form-label" style="margin-top: 20px;">Welche Services interessieren Sie? <span
                style="color: var(--danger);">*</span></label>
        <div class="services-grid mb-4">
            <div class="service-card">
                <input type="checkbox" name="services" value="floor" id="service-floor" class="service-checkbox">
                <label for="service-floor">
                    <i class="bi bi-brush-all"></i>
                    <div class="service-name">Bodenreinigung</div>
                    <small>Professionelle Bodenbearbeitung</small>
                </label>
            </div>

            <div class="service-card">
                <input type="checkbox" name="services" value="windows" id="service-windows" class="service-checkbox">
                <label for="service-windows">
                    <i class="bi bi-border-all"></i>
                    <div class="service-name">Fensterreinigung</div>
                    <small>Streifenfreie saubere Fenster</small>
                </label>
            </div>

            <div class="service-card">
                <input type="checkbox" name="services" value="deep" id="service-deep" class="service-checkbox">
                <label for="service-deep">
                    <i class="bi bi-stars"></i>
                    <div class="service-name">Tiefenreinigung</div>
                    <small>Umfassende gründliche Reinigung</small>
                </label>
            </div>

            <div class="service-card">
                <input type="checkbox" name="services" value="kitchen" id="service-kitchen" class="service-checkbox">
                <label for="service-kitchen">
                    <i class="bi bi-fire"></i>
                    <div class="service-name">Küchenreinigung</div>
                    <small>Entfettung und Desinfektion</small>
                </label>
            </div>

            <div class="service-card">
                <input type="checkbox" name="services" value="bathroom" id="service-bathroom" class="service-checkbox">
                <label for="service-bathroom">
                    <i class="bi bi-droplet"></i>
                    <div class="service-name">Badezimmerreinigung</div>
                    <small>Fliesen und Armaturen</small>
                </label>
            </div>

            <div class="service-card">
                <input type="checkbox" name="services" value="carpet" id="service-carpet" class="service-checkbox">
                <label for="service-carpet">
                    <i class="bi bi-layers"></i>
                    <div class="service-name">Teppichreinigung</div>
                    <small>Intensive Polsterreinigung</small>
                </label>
            </div>
        </div>

    </div>

    <!-- Zusätzliche Informationen -->
    <div class="form-section">
        <div class="section-title">
            <i class="bi bi-pencil-square"></i>
            Zusätzliche Informationen
        </div>

        <label class="form-label">Weitere Anforderungen oder Besonderheiten</label>
        <textarea name="details" class="form-control mb-3" rows="4"
            placeholder="Beschreiben Sie hier spezielle Anforderungen, besondere Bereiche die gereinigt werden sollen, oder andere wichtige Informationen..."></textarea>

        <!-- <label class="form-label">Wie haben Sie uns gefunden?</label>
        <select name="referral" class="form-select mb-3">
            <option value="">Bitte auswählen</option>
            <option value="google">Google Search</option>
            <option value="friend">Empfehlung von Freunden</option>
            <option value="facebook">Facebook</option>
            <option value="instagram">Instagram</option>
            <option value="other">Sonstiges</option>
        </select> -->

        <div class="checkbox-item">
            <input type="checkbox" name="terms" id="terms" required>
            <label for="terms">Ich akzeptiere die Datenschutzerklärung und Nutzungsbedingungen</label>
        </div>
        <p class="required-note">Alle mit <span style="color: var(--danger);">*</span> gekennzeichneten Felder
            sind erforderlich</p>
    </div>

    <!-- Nachricht -->
    <div class="form-feedback mb-3"></div>

    <!-- Buttons -->
    <div class="form-footer">
        <button type="reset" class="btn btn-secondary">
            <i class="bi bi-arrow-clockwise"></i> Zurücksetzen
        </button>
        <button type="submit" class="btn btn-primary">
            <i class="bi bi-check-circle"></i> Kostenlose Anfrage stellen
        </button>
    </div>

    <!-- Benefits -->
    <div class="benefits">
        <div class="benefit-item">
            <i class="bi bi-check-circle"></i>
            Kostenlos
        </div>
        <div class="benefit-item">
            <i class="bi bi-check-circle"></i>
            Unverbindlich
        </div>
        <div class="benefit-item">
            <i class="bi bi-check-circle"></i>
            Innerhalb 24h Rückmeldung
        </div>
    </div>

</form>
